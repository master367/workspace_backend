# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration file names; during an upgrade
# provide a version identifier of the form <rev>_<name>
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# leave blank for local time
# timezone =

# max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc files to be created; otherwise
# the initial execution of the "alembic" command will create
# .pyc files which may be owned by a different user
# sourceless = false

# version location specification; This defaults to migrations/versions.
# When using multiple version directories, separate the paths by
# spaces, or use a list format with a separate line per path.
# version_locations = %(here)s/bar %(here)s/bat migrations/versions

# version_path_separator = :

# set to 'true' to search for scripts recursively
# recursive_version_locations = false

# the output encoding used when revision files are written from script.py.mako
# output_encoding = utf-8

sqlalchemy.url = postgresql+asyncpg://postgres:postgres@127.0.0.1:5433/workspace_db


[post_write_hooks]
# post_write_hooks allows scripts to be run after generating a revision
# file, such as running "black" or "ruff" for formatting.
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = REVISION_SCRIPT_FILENAME

[logging]
default_handler = console
loggers = alembic,sqlalchemy

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
